{% extends 'base.html' %}

{% block title %}Check Your Email — RPMS{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding-top: 2rem; text-align:center;">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:2rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">📬</div>
        <h1 style="font-size:1.25rem; font-weight:800; color:var(--text); margin-bottom:0.75rem;">
            Check Your Inbox
        </h1>
        <p style="color:var(--muted); font-size:0.85rem; line-height:1.7; margin-bottom:1.5rem;">
            If an account exists with that email, we've sent a password reset link. 
            The link expires in 3 days and can only be used once.
        </p>
        <a href="{% url 'login' %}" class="btn btn-secondary" style="width:100%;">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Password Updated — RPMS{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding-top: 2rem; text-align:center;">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:2rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">🔓</div>
        <h1 style="font-size:1.25rem; font-weight:800; color:var(--text); margin-bottom:0.75rem;">
            Password Changed Successfully
        </h1>
        <p style="color:var(--muted); font-size:0.85rem; margin-bottom:1.5rem;">
            Your password has been updated. You can now log in with your new password.
        </p>
        <a href="{% url 'users:login' %}" class="btn btn-primary" style="width:100%;">
            Log In Now
        </a>
    </div>
</div>
{% endblock %}

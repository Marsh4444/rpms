{% extends 'base.html' %}

{% block title %}Reset Password — RPMS{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding-top: 2rem;">
    <div style="margin-bottom: 2rem;">
        <h1 style="font-size:1.75rem; font-weight:800; color:var(--text); margin-bottom:0.4rem;">
            Reset Password
        </h1>
        <p style="color:var(--muted); font-size:0.85rem;">
            Enter your email address and we'll send you a reset link.
        </p>
    </div>

    <div style="background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:1.5rem;">
        <form method="post" novalidate>
            {% csrf_token %}

            <div style="margin-bottom:1.5rem;">
                <label style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:0.5rem;">
                    Email Address
                </label>
                <input type="email" name="email" required autofocus
                       style="width:100%; padding:0.7rem; background:var(--bg); border:1px solid var(--border); 
                              border-radius:2px; color:var(--text); font-size:0.85rem;">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
                Send Reset Link
            </button>
        </form>
    </div>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.82rem; color:var(--muted);">
        Remember your password?
        <a href="{% url 'login' %}" style="color:var(--accent);">Back to login</a>
    </p>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile - RPMS{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/properties.css' %}">
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1 class="form-title">Edit Profile</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Profile Picture -->
            <div class="form-group" style="text-align: center;">
                {% if user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="{{ user.username }}" 
                         style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem;">
                        <input type="checkbox" name="profile_picture-clear"> Remove profile picture
                    </label>
                {% endif %}
                <label for="id_profile_picture" class="form-label">Profile Picture</label>
                <input type="file" name="profile_picture" id="id_profile_picture" class="form-input" accept="image/*">
            </div>
            
            <!-- Name Fields -->
            <div class="form-row">
                <div class="form-group">
                    <label for="id_first_name" class="form-label">First Name</label>
                    <input type="text" name="first_name" id="id_first_name" class="form-input" 
                           value="{{ user.first_name }}" placeholder="First name">
                </div>
                <div class="form-group">
                    <label for="id_last_name" class="form-label">Last Name</label>
                    <input type="text" name="last_name" id="id_last_name" class="form-input" 
                           value="{{ user.last_name }}" placeholder="Last name">
                </div>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label for="id_email" class="form-label">Email</label>
                <input type="email" name="email" id="id_email" class="form-input" 
                       value="{{ user.email }}" placeholder="Email address">
            </div>
            
            <!-- Phone Number -->
            <div class="form-group">
                <label for="id_phone_number" class="form-label">Phone Number</label>
                <input type="text" name="phone_number" id="id_phone_number" class="form-input" 
                       value="{{ user.phone_number|default:'' }}" placeholder="Phone number">
            </div>
            
            <!-- Company Name -->
            <div class="form-group">
                <label for="id_company_name" class="form-label">Company Name</label>
                <input type="text" name="company_name" id="id_company_name" class="form-input" 
                       value="{{ user.company_name|default:'' }}" placeholder="Company or business name">
            </div>
            
            <!-- Bio -->
            <div class="form-group">
                <label for="id_bio" class="form-label">Bio</label>
                <textarea name="bio" id="id_bio" class="form-input" rows="4" 
                          placeholder="Tell us about yourself...">{{ user.bio|default:'' }}</textarea>
            </div>
            
            <!-- Address -->
            <div class="form-group">
                <label for="id_address" class="form-label">Address</label>
                <input type="text" name="address" id="id_address" class="form-input" 
                       value="{{ user.address|default:'' }}" placeholder="Street address">
            </div>
            
            <!-- City and State -->
            <div class="form-row">
                <div class="form-group">
                    <label for="id_city" class="form-label">City</label>
                    <input type="text" name="city" id="id_city" class="form-input" 
                           value="{{ user.city|default:'' }}" placeholder="City">
                </div>
                <div class="form-group">
                    <label for="id_state" class="form-label">State</label>
                    <input type="text" name="state" id="id_state" class="form-input" 
                           value="{{ user.state|default:'' }}" placeholder="State">
                </div>
            </div>
            
            <!-- Website -->
            <div class="form-group">
                <label for="id_website" class="form-label">Website</label>
                <input type="url" name="website" id="id_website" class="form-input" 
                       value="{{ user.website|default:'' }}" placeholder="https://example.com">
            </div>
            
            <!-- Form Actions -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
